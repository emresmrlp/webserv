server {
    listen 127.0.0.1:8080;
    listen 127.0.0.1:8081;
    listen 127.0.0.1:8082;
    root www;
    server_name localhost 127.0.0.1 sumeralp.com;
    client_max_body_size 10m;
    error_page 404 404.html;
    location /
    {
        root www;
        allowed_methods GET;
        autoindex on;
        index index.html;
    }
    location /post_body
    {
        client_max_body_size 100;
        root ./www;
        allowed_methods POST;
    }

    location /directory
    {
        root YoupiBanane;
        allowed_methods GET;
        index youpi.bad_extension;
        autoindex on;
    }
}
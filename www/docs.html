<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Webserv | Docs</title>
    <style>
        * { box-sizing: border-box; cursor: none; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #121212; color: #eeeeee; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: rgba(30, 30, 30, 0.9); padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .nav-brand { font-weight: 900; color: #10b981; text-decoration: none; font-size: 20px; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 40px; font-size: 16px; font-weight: 700; }
        .nav-links a:hover { color: #10b981; }
        .content { flex: 1; display: flex; justify-content: center; padding: 60px; }
        .box { padding: 40px; background: #1e1e1e; border-radius: 16px; border-top: 8px solid #10b981; width: 100%; max-width: 900px; }
        pre { background: #000; padding: 20px; color: #10b981; border-radius: 8px; font-family: monospace; }
        .particle { position: fixed; width: 8px; height: 8px; background: #10b981; pointer-events: none; border-radius: 2px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">WEBSERV / CORE</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="docs.html" class="active">Docs</a>
            <a href="debug.html">Debug</a>
        </div>
    </nav>
    <div class="content"><div class="box"><h1>Deployment</h1><pre>$ make && ./webserv config.conf</pre></div></div>
    <script>
        document.addEventListener('mousemove', (e) => {
            const p = document.createElement('div'); p.className = 'particle';
            document.body.appendChild(p); p.style.left = e.clientX+'px'; p.style.top = e.clientY+'px';
            p.animate([{transform:'scale(1)',opacity:0.8},{transform:'scale(0)',opacity:0}], 800).onfinish = () => p.remove();
        });
    </script>
</body>
</html>

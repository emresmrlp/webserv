<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Webserv | Docs</title>
    <style>
        * { box-sizing: border-box; cursor: none; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #121212; color: #eeeeee; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background: #1e1e1e; padding: 25px 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .nav-brand { font-weight: 800; letter-spacing: 2px; color: #10b981; text-decoration: none; font-size: 14px; text-transform: uppercase; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 40px; font-size: 13px; text-transform: uppercase; transition: 0.3s; letter-spacing: 1.5px; font-weight: 700; }
        .nav-links a:hover, .active { color: #10b981 !important; }

        .content { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 60px 40px; }
        .box { padding: 60px; background: #1e1e1e; border-radius: 16px; border-top: 6px solid #10b981; max-width: 1200px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        h2 { font-size: 32px; color: #fff; margin: 0 0 40px 0; letter-spacing: -1px; font-weight: 800; }
        
        /* Geniş Grid Sistemi */
        .test-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #161616; padding: 30px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #10b981; }
        h4 { margin: 0 0 20px 0; color: #10b981; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 14px; color: #10b981; border-radius: 6px; margin-bottom: 15px; font-family: monospace; font-size: 13px; outline: none; }
        input:focus { border-color: #10b981; }
        button { width: 100%; background: #10b981; color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 800; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        button:hover { background: #fff; transform: translateY(-2px); }

        .footer { font-size: 11px; border-top: 1px solid #333; padding-top: 25px; text-transform: uppercase; letter-spacing: 1.5px; color: #666; text-align: left; margin-top: 60px; }
        b { color: #888; }
        .particle { position: fixed; width: 6px; height: 6px; background: #10b981; pointer-events: none; border-radius: 1px; z-index: 9999; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">WEBSERV — HEY LISTEN()!</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="docs.html" class="active">Docs</a>
            <a href="debug.html">Debug</a>
        </div>
    </nav>
    <div class="content"><div class="box"><h1>Deployment</h1><pre>$ make && ./webserv config.conf</pre></div></div>
    <script>
        document.addEventListener('mousemove', (e) => {
            const p = document.createElement('div'); p.className = 'particle';
            document.body.appendChild(p); p.style.left = e.clientX+'px'; p.style.top = e.clientY+'px';
            p.animate([{transform:'scale(1)',opacity:0.8},{transform:'scale(0)',opacity:0}], 800).onfinish = () => p.remove();
        });
    </script>
</body>
</html>
